<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lexical Scala.js Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    #toolbar {
      margin: 16px 0;
    }
    #toolbar button {
      padding: 8px 16px;
      margin-right: 8px;
      cursor: pointer;
    }
    #editor {
      border: 1px solid #ccc;
      min-height: 200px;
      padding: 16px;
    }
    .editor-paragraph {
      margin: 0 0 8px 0;
    }
  </style>
</head>
<body>
  <h1>Lexical Scala.js Demo</h1>
  <div id="toolbar"></div>
  <div id="editor" contenteditable="true"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
