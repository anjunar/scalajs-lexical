<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lexical Scala.js Demo</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="./src/index.css">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>Lexical Scala.js Demo</h1>
      <p class="subtitle">A powerful rich-text editor built with Scala.js and Lexical</p>
    </header>
    
    <main class="editor-shell">
      <div id="toolbar" class="toolbar"></div>
      <div class="editor-container">
        <div id="editor" class="editor-input" contenteditable="true"></div>
      </div>
    </main>
    
    <section class="state-viewer">
      <h3>Editor State (JSON)</h3>
      <pre id="state"></pre>
    </section>
  </div>
  
  <script type="module" src="./src/main.js"></script>
</body>
</html>
